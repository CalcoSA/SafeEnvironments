name: Deploy SafeEnvironments PROD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-prod:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Crear archivo .env PROD
        env:
          ENV_PROD: ${{ secrets.ENV_PROD }}
        run: |
          printf '%s' "$ENV_PROD" > .env.deploy

      - name: Configurar SSH
        env:
          SSH_KEY: ${{ secrets.GCP_SSH_KEY }}
          GCP_HOST: ${{ secrets.GCP_HOST }}
          GCP_SSH_PORT: ${{ secrets.GCP_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${GCP_SSH_PORT:-22}" "$GCP_HOST" >> ~/.ssh/known_hosts

      - name: Crear carpeta PROD en servidor
        env:
          GCP_HOST: ${{ secrets.GCP_HOST }}
          GCP_USER: ${{ secrets.GCP_USER }}
          GCP_SSH_PORT: ${{ secrets.GCP_SSH_PORT }}
        run: |
          ssh -p "${GCP_SSH_PORT:-22}" "$GCP_USER@$GCP_HOST" "
            mkdir -p /opt/apps/safeenvironments/prod
          "

      - name: Subir código PROD
        env:
          GCP_HOST: ${{ secrets.GCP_HOST }}
          GCP_USER: ${{ secrets.GCP_USER }}
          GCP_SSH_PORT: ${{ secrets.GCP_SSH_PORT }}
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.venv' \
            --exclude 'venv' \
            --exclude '__pycache__' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'generated_pdfs' \
            --exclude 'private_storage' \
            -e "ssh -p ${GCP_SSH_PORT:-22}" \
            ./ "$GCP_USER@$GCP_HOST:/opt/apps/safeenvironments/prod/"

          scp -P "${GCP_SSH_PORT:-22}" .env.deploy "$GCP_USER@$GCP_HOST:/opt/apps/safeenvironments/prod/.env"

      - name: Desplegar PROD con Docker Compose
        env:
          GCP_HOST: ${{ secrets.GCP_HOST }}
          GCP_USER: ${{ secrets.GCP_USER }}
          GCP_SSH_PORT: ${{ secrets.GCP_SSH_PORT }}
        run: |
          ssh -p "${GCP_SSH_PORT:-22}" "$GCP_USER@$GCP_HOST" "
            cd /opt/apps/safeenvironments/prod &&
            mkdir -p generated_pdfs private_storage &&
            docker-compose -f docker-compose.prod.yml down &&
            docker-compose -f docker-compose.prod.yml build &&
            docker-compose -f docker-compose.prod.yml run --rm web flask --app \"app:create_app('production')\" db upgrade &&
            docker-compose -f docker-compose.prod.yml up -d &&
            docker image prune -f
          "